name: web-crawler-local

services:
  queue:
    image: rabbitmq:3.13-management
    container_name: crawler-queue
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-crawler}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-crawler}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  db:
    image: postgres:16
    container_name: crawler-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U ${POSTGRES_USER:-crawler} -d ${POSTGRES_DB:-crawler}",
      ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  cache:
    image: redis:7.4-alpine
    container_name: crawler-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:
